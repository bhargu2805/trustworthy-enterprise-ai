services:
  api:
    build:
      context: ../apps/gateway
    environment:
      - APP_ENV=dev
      - PYTHONPATH=/app:/app/packages
      - POLICY_PATH=/app/policies/policy.yaml
    ports:
      - "8000:8000"
    volumes:
      - ../apps/gateway:/app
      - ../packages/compliance:/app/packages/compliance:ro
      - ../packages/retriever:/app/packages/retriever:ro
      - ../apps/gateway/policies/policy.yaml:/app/policies/policy.yaml:ro
      - ../apps/gateway/data:/app/data
    command: ["uvicorn","main:app","--host","0.0.0.0","--port","8000","--reload"]
